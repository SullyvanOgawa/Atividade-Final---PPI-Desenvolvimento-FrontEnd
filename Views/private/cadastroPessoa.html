<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Cadastro de Pessoas</title>
</head>

<body class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">
            <div class="card p-4 shadow mb-4">
                <h3 class="mb-3 text-center">Cadastro de Pessoa</h3>

                <form id="formPessoas" method="POST" action="#" class="row g-3">

                    <div class="col-md-2">
                        <label for="id" class="form-label">Id</label>
                        <input type="text" class="form-control" id="id" name="id" value="" readonly>
                    </div>

                    <div class="mb-3">
                        <label for="cpf" class="form-label">CPF</label>
                        <input type="text" class="form-control" id="cpf" name="cpf" value="" required>
                    </div>

                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome</label>
                        <input type="text"  class="form-control" id="nome" name="nome" value="" required>
                    </div>

                    <div class="mb-3">
                        <label for="telefone" class="form-label">Telefone</label>
                        <input type="text" class="form-control" id="telefone" name="telefone" value="" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">email</label>
                        <input type="text" class="form-control" id="email" name="email" value="" required>
                    </div>
                    

                    <div class="row mt-5 mb-4 text-center">
                        <div class="col-12">
                            <button class="btn btn-primary me-2" id='cadastrar' type="button">Cadastrar</button>
                            <button class="btn btn-warning me-2" id='atualizar' type="button">Atualizar</button>
                            <button class="btn btn-danger me-2" id='excluir' type="button">Excluir</button>
                            <button class="btn btn-secondary me-2" type="button" onclick="history.back()">Voltar</button>
                        </div>
                    </div>
                    <div id="mensagem"></div>
                </form>
            </div>
        </div>
       
        <div id="exibePessoa"></div>
        
    </div>
    <script src="Scripts/cadastroPessoa.js"></script>
</body>

</html>
