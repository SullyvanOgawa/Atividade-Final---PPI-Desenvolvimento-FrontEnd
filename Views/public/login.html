<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Formulario de Login</title>
</head>

<body class="d-flex align-items-center justify-content-center vh-100 bg-body-tertiary">
    <main class="w-100 m-auto py-5 px-4 rounded-4 shadow-lg bg-dark" style="max-width: 400px;">
        <form method="POST" action="/login" class="row g-3">
            <h1 class="h3 mb-3 fw-normal text-center">Login</h1>

            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Digite seu usuário"
                    required>
                <label for="usuario">Usuário</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="senha" name="senha" placeholder="Digite sua senha"
                    required>
                <label for="senha">Senha</label>
            </div>

            <div class="col-12 mb-3 ">
                <button class="btn btn-primary w-100 mb-4 py-2" type="submit">Login</button>
                <button class="btn btn-secondary w-100 py-2" type="button" onclick="history.back()">Voltar</button>
            </div>
            
        </form>
    </main>

</body>

</html>
